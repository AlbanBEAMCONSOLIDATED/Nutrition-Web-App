<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TB1 Flashcards – Units 1–6</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header>
    <h1>TB1 – Flashcards (Units 1–6)</h1>
    <div class="nav">
      <button id="tabVocab" class="active">Vocabulaire</button>
      <button id="tabGrammar">Grammaire</button>
      <button id="tabTests">Tests</button>
    </div>
  </header>

  <div class="container">

    <!-- VOCAB -->
    <section id="panelVocab" class="panel active">
      <div class="card-controls">
        <select id="unitFilter" class="select"></select>

        <select id="directionMode" class="select">
          <option value="random" selected>Sens : Aléatoire</option>
          <option value="fr_en">Sens : FR → EN</option>
          <option value="en_fr">Sens : EN → FR</option>
        </select>

        <input id="searchBox" class="input" placeholder="Recherche (EN ou FR)..." />
        <button id="btnShuffle" class="small-btn" title="Remélanger">🔀</button>
        <button id="btnPrev" class="small-btn" title="Précédent">◀</button>
        <button id="btnNext" class="small-btn" title="Suivant">▶</button>
      </div>

      <div class="notice" id="countText"></div>

      <div class="progress-wrap">
        <div class="progress-bar-wrap"><div id="progressBar" class="progress-bar"></div></div>
        <div id="progressText" class="progress-text">—</div>
      </div>

      <div class="unit-badge" id="unitBadge">—</div>

      <div id="scene" class="scene" aria-label="Flashcard">
        <div id="card3d" class="card3d">
          <div class="face front">
            <div>
              <div id="frontLabel" class="label">Français</div>
              <div id="frontWord" class="word">—</div>
            </div>
            <div class="examples">
              <div class="title">Exemples (EN)</div>
              <div id="examplesEn" class="lines">—</div>
              <button id="btnToggleTr" class="toggle">Traduction</button>
              <div id="examplesFr" class="fr">—</div>
            </div>
          </div>

          <div class="face back">
            <div>
              <div id="backLabel" class="label">English</div>
              <div id="backWord" class="word">—</div>
            </div>
            <div class="examples">
              <div class="title">Exemples (EN)</div>
              <div id="examplesEnBack" class="lines" style="display:none;"></div>
            </div>
          </div>
        </div>
      </div>

      <div id="hint" class="hint">Clique sur la carte pour la retourner</div>

      <div id="actions" class="actions" style="display:none;">
        <button id="btnNo" class="btn-no">Je connais pas</button>
        <button id="btnYes" class="btn-yes">Je connais</button>
      </div>
    </section>

    <!-- GRAMMAR -->
    <section id="panelGrammar" class="panel">
      <div class="notice">Cours + cas techniques + mini-exercices (corrigés).</div>
      <div id="grammarRoot"></div>
    </section>

    <!-- TESTS -->
    <section id="panelTests" class="panel">
      <div class="tests-box">
        <div class="tests-row">
          <select id="testMode" class="select">
            <option value="vocab">Test Vocab</option>
            <option value="grammar">Test Grammaire</option>
            <option value="mixed" selected>Test Mix</option>
          </select>

          <select id="testCount" class="select">
            <option value="10">10 questions</option>
            <option value="20" selected>20 questions</option>
            <option value="30">30 questions</option>
          </select>

          <button id="btnStartTest" class="small-btn">Démarrer</button>
          <button id="btnRestartTest" class="small-btn">Recommencer</button>
          <div class="notice">Score: <span id="testScore">—</span></div>
        </div>

        <div id="testQ"></div>
      </div>
    </section>

  </div>

  <script src="./data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
